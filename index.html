<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <!-- Título da aba -->
    <title>Meus sites favoritos</title>

    <style>

        /* Estilo do corpo da página */
        body{
            background-color: #1b1b1b;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            color: white;
            margin: 0;
            padding: 20px;
        }

        /* Título principal */
        h1{
            color: #00ffcc;
            margin-bottom: 40px;
        }

        /* Caixa dos sites */
        .site{
            background-color: #2a2a2a;
            width: 350px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,255,204,0.4);
        }

        /* Nome dos sites */
        h2{
            color: #ffffff;
        }

        /* Imagens */
        img{
            width: 300px;
            height: 180px;
            border-radius: 10px;
            transition: 0.3s;
        }

        /* Efeito ao passar o mouse */
        img:hover{
            transform: scale(1.05);
        }

        /* Links */
        a{
            text-decoration: none;
            color: #00ffcc;
            font-weight: bold;
        }

        a:hover{
            color: #ffffff;
        }

    </style>

</head>

<body>

    <!-- Título da página -->
    <h1>Meus sites favoritos: José Alves</h1>

    <!-- SITE 1 -->
    <div class="site">

        <h2>Aika Online</h2>

        <a href="https://aikaonline-br.cbmgames.com" target="_blank">
            <img src="AikaOnline.jpg" alt="Aika Online">
        </a>

        <br><br>

        <a href="https://aikaonline-br.cbmgames.com" target="_blank">
            Acessar Aika Online
        </a>

    </div>

    <!-- SITE 2 -->

            <img src="crunchyroll.jpg.webp" alt="Crunchyroll">
        </a>

        <br><br>

        <a href="https://www.crunchyroll.com/pt-br/discover" target="_blank">
            Acessar Crunchyroll
        </a>

    </div>

    <!-- SITE 3 -->
    <div class="site">

        <h2>HBO Max</h2>

        <a href="https://play.hbomax.com" target="_blank">
            <img src="hbomax.jpg.webp" alt="HBO Max">
        </a>

        <br><br>

        <a href="https://play.hbomax.com" target="_blank">
            Acessar HBO Max
        </a>

    </div>

    <!-- SITE 4 -->
    <div class="site">

        <h2>Spotify</h2>

        <a href="https://open.spotify.com/intl-pt" target="_blank">
            <img src="spotify.jpg.jpg" alt="Spotify">
        </a>

        <br><br>

        <a href="https://open.spotify.com/intl-pt" target="_blank">
            Acessar Spotify
        </a>

    </div>

    <!-- SITE 5 -->

        </a>

        <br><br>

        <a href="https://www.youtube.com" target="_blank">
            Acessar YouTube
        </a>

    </div>

</body>

</html>
